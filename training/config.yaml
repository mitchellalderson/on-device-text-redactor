project_name: "phi-firewall-redaction"
model_name: "LFM2.5-350M"
training_type: "sft"

dataset:
  path: "aldersondev/phi-redaction-sft"
  type: "sft"
  test_size: 0.2

training_config:
  extends: "DEFAULT_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 8
  learning_rate: 2e-4
  seed: 42

peft_config:
  extends: "DEFAULT_LORA"
  use_peft: true

modal:
  app_name: "phi-firewall-finetune"
  gpu: "H100:1"
  timeout: 13200
  output_volume: "phi-firewall-finetune"
  output_dir: "/outputs"
  detach: true
